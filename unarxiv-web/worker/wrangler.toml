name = "unarxiv-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
# Secrets — set via `wrangler secret put <NAME>` (never commit values):
#   TURNSTILE_SECRET_KEY
#   MODAL_WEBHOOK_SECRET
#   ADMIN_PASSWORD
#   MODAL_FUNCTION_URL   ← moved to secret to avoid exposing the public endpoint URL
#   ENCRYPTION_KEY       ← AES-256-GCM key for encrypting user API keys (generate with: openssl rand -base64 32)
#
# Public Turnstile site key (safe to commit — it's embedded in the frontend too)
TURNSTILE_SITE_KEY = "0x4AAAAAACq7Empy5Tza8tKi"
DAILY_GLOBAL_LIMIT = "50"
PER_IP_DAILY_LIMIT = "24"
PAPER_SUBMISSION_DAILY_LIMIT = "240"
QUEUE_BATCH_SIZE = "3"

[triggers]
crons = ["*/15 * * * *", "0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "unarxiv-db"
# database_id is NOT committed — it lives in wrangler.production.toml (gitignored).
# For local dev, wrangler creates a local SQLite and doesn't use the real ID.
# For production deploy, CI writes wrangler.production.toml from the D1_DATABASE_ID secret.
# See SECURITY-TODO.md for instructions on rolling the ID when needed.
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "unarxiv-audio"
