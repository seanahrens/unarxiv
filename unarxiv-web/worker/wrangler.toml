name = "unarxiv-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
# Set these via `wrangler secret put`:
# TURNSTILE_SECRET_KEY
# MODAL_WEBHOOK_SECRET
# ADMIN_PASSWORD
TURNSTILE_SITE_KEY = "0x4AAAAAACq7Empy5Tza8tKi"
MODAL_FUNCTION_URL = "https://seanahrens--unarxiv-worker-trigger-narration.modal.run"
DAILY_GLOBAL_LIMIT = "50"
PER_IP_DAILY_LIMIT = "10"
QUEUE_BATCH_SIZE = "3"

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "unarxiv-db"
database_id = "f87529b5-2f6c-43a9-988c-92f41e0a790e"

[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "unarxiv-audio"
