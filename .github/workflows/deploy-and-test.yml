name: Deploy & E2E Test

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Skip deploy, only run tests"
        type: boolean
        default: false

jobs:
  deploy:
    if: ${{ !inputs.skip_deploy }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      deployed: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need HEAD~1 for rollback

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install worker dependencies
        working-directory: texreader-web/worker
        run: npm ci

      - name: Deploy Worker API
        working-directory: texreader-web/worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install frontend dependencies
        working-directory: texreader-web/frontend
        run: npm ci

      - name: Build frontend
        working-directory: texreader-web/frontend
        run: npm run build

      - name: Deploy Frontend
        working-directory: texreader-web/frontend
        run: npx wrangler pages deploy out --project-name=texreader-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for Cloudflare propagation
        run: sleep 10

  test:
    needs: [deploy]
    if: ${{ always() && (needs.deploy.result == 'success' || inputs.skip_deploy) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install E2E dependencies
        working-directory: texreader-web/e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: texreader-web/e2e
        run: npx playwright install chromium --with-deps

      - name: Run full E2E tests
        id: e2e
        working-directory: texreader-web/e2e
        run: npx playwright test --project=full
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TEST_BASE_URL: https://unarxiv.org
          TEST_API_URL: https://api.unarxiv.org

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: texreader-web/e2e/playwright-report/
          retention-days: 7

  rollback:
    needs: [deploy, test]
    if: ${{ failure() && needs.deploy.result == 'success' && needs.test.result == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Checkout previous commit
        run: git checkout HEAD~1

      - name: Install worker dependencies
        working-directory: texreader-web/worker
        run: npm ci

      - name: Rollback Worker API
        working-directory: texreader-web/worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install frontend dependencies
        working-directory: texreader-web/frontend
        run: npm ci

      - name: Build previous frontend
        working-directory: texreader-web/frontend
        run: npm run build

      - name: Rollback Frontend
        working-directory: texreader-web/frontend
        run: npx wrangler pages deploy out --project-name=texreader-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify rollback
        if: always()
        run: echo "::error::E2E tests failed! Rolled back to previous commit ($(git rev-parse --short HEAD))"
